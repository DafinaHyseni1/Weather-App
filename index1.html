<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikacioni i Motit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="sunny-bg">
        <header>
            <h1>Aplikacioni i Motit</h1>
            <p>Kërko qytetin tuaj për të parë motin aktual.</p>
        </header>
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Shkruaj qytetin...">
            <button id="search-btn">Kërko</button>
        </div>
        <main>
            <div class="weather-display">
                <h2 id="city-name">Tiranë</h2>
                <h3 id="temperature">15°C</h3>
                <p id="weather-description">Diell me re</p>
                <img id="weather-icon" src="weatherlogo.png" alt="Ikona e motit">
            </div>
        </main>
        <footer>
            <p>&copy; 2024 Aplikacioni i Motit. Dizajnuar me 💡.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
